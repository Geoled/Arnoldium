<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Automation — Car Randomizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #10131c;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 1200px;
      background: rgba(20, 24, 35, 0.85);
      backdrop-filter: blur(16px);
      border-radius: 2.5rem;
      padding: 2.2rem 2rem;
      box-shadow: 0 30px 50px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d9dfee;
    }
    h1 {
      font-weight: 500;
      font-size: 2.4rem;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 0.4rem;
      color: #f0f4ff;
      text-transform: uppercase;
    }
    .subtitle {
      text-align: center;
      margin-bottom: 2.2rem;
      color: #7a83a0;
      font-weight: 400;
      font-size: 1rem;
    }
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }
    button {
      background: #22283a;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 0.95rem 2rem;
      border-radius: 3rem;
      font-weight: 600;
      font-size: 1.1rem;
      color: #dce3ff;
      background: linear-gradient(180deg, #2e354b 0%, #1a1f2d 100%);
      box-shadow: 0 6px 0 #0c0f16, 0 10px 20px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: all 0.08s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      flex: 1 1 auto;
      min-width: 210px;
      letter-spacing: 0.4px;
    }
    button:active {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #0b0e14, 0 8px 15px rgba(0,0,0,0.6);
      background: linear-gradient(180deg, #262d40 0%, #131722 100%);
    }
    .output-panel {
      background: #0b0e16;
      border-radius: 1.8rem;
      padding: 1.8rem;
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.7);
      color: #c8d1e6;
      font-size: 0.95rem;
      line-height: 1.5;
      max-height: 580px;
      overflow-y: auto;
    }
    .spec-grid { display: flex; flex-wrap: wrap; gap: 24px; }
    .spec-column { flex: 1 1 260px; }
    .spec-column h3 {
      font-weight: 500;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      border-bottom: 1px solid #2e3547;
      padding-bottom: 0.5rem;
      margin-bottom: 0.9rem;
      color: #9ea9cc;
    }
    .param { display: flex; justify-content: space-between; margin-bottom: 0.35rem; font-size: 0.92rem; }
    .param span:first-child { color: #8089a8; }
    .param span:last-child { font-weight: 500; color: #e1e8ff; }
    .high { color: #4caf50 !important; font-weight: 600; }
    .medium { color: #ffb74d !important; font-weight: 600; }
    .low { color: #e57373 !important; font-weight: 600; }
    hr { border: none; border-top: 1px solid #262d3f; margin: 1.2rem 0; }
    .goal-box { background: #161b27; border-radius: 1.5rem; padding: 1.6rem; margin-top: 0.3rem; }
    .goal-title { font-size: 1.8rem; font-weight: 600; margin-bottom: 0.4rem; color: #ffb347; }
    .goal-desc { font-size: 1.1rem; display: flex; flex-wrap: wrap; gap: 20px; }
    .footnote { font-size: 0.82rem; color: #5b6379; text-align: center; margin-top: 1rem; }
    .fix-row {
      display: flex; flex-wrap: wrap; align-items: center; gap: 1.5rem;
      margin-bottom: 2rem; background: #161b27; padding: 1rem 1.5rem; border-radius: 2rem;
    }
    .fix-row label { color: #a8b3d1; font-size: 0.95rem; }
    select {
      background: #2b3142; color: #e0e5f5; border: 1px solid #3d445a;
      padding: 0.5rem 1.2rem; border-radius: 2rem; font-weight: 500;
    }
    .class-score { text-align: center; margin-top: 0.5rem; font-size: 1.2rem; font-weight: 500; }
    .comparison-container { display: flex; gap: 24px; flex-wrap: wrap; }
    .comparison-column { flex: 1 1 45%; min-width: 300px; background: #0b0e16; border-radius: 1.8rem; padding: 1.2rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>Automation Randomizer</h1>
  <div class="subtitle">генератор концептов и технических характеристик</div>

  <div class="fix-row">
    <label>Класс:</label>
    <select id="fixClass"><option value="">Случайно</option></select>
    <label>Кузов:</label>

  </div>

    <button id="goalBtn">Цель и кузов</button>
    <button id="nameGenBtn">Сгенерировать название</button>
    <button id="rivalBtn">Сгенерировать соперника</button>
  </div>

  <div class="output-panel" id="outputDisplay">
    <div style="text-align: center; color: #4b5268;">Нажмите кнопку, чтобы создать случайную конфигурацию</div>
  </div>
</div>

    function classRating(value, target) {
      if (!target) return '';
      if (Array.isArray(target)) {
        if (target.length === 2 && typeof target[0] === 'number') {
          if (value >= target[0] && value <= target[1]) return 'high';
          const margin = (target[1] - target[0]) * 0.5;
          if (value >= target[0] - margin && value <= target[1] + margin) return 'medium';
          return 'low';
        } else {
          if (target.includes(value)) return 'high';
          for (let t of target) { if (value.includes(t)) return 'medium'; }
          return 'low';

      return '';

            <div class="param"><span>Макс. мощность</span><span class="${rated('powerRange', r.maxPowerKW)}">${e.maxPower}</span></div>
            <div class="param"><span>Крутящий момент</span><span class="${rated('torque', r.torqueNm)}">${e.torque}</span></div>
            <div class="param"><span>Redline</span><span class="${rated('redline', r.redline)}">${e.redline}</span></div>
            <div class="param"><span>Октановое число</span><span>${e.octane}</span></div>
            <div class="param"><span>Тип топлива</span><span class="${rated('fuelType', e.fuelType)}">${e.fuelType}</span></div>
          </div>
          <div class="spec-column"><h3>Трансмиссия</h3>
            <div class="param"><span>Коробка передач</span><span class="${rated('gearbox', d.gearbox.split(' ')[0])}">${d.gearbox}</span></div>
            <div class="param"><span>Передач</span><span class="${rated('gearCount', r.gearCount)}">${d.gearbox.split(' ').pop()}</span></div>
            <div class="param"><span>Дифференциал</span><span class="${rated('diff', d.diff)}">${d.diff}</span></div>
          </div>
        </div>
        <div class="spec-grid" style="margin-top:8px;">
          <div class="spec-column"><h3>Шасси и подвеска</h3>
            <div class="param"><span>Тип шасси</span><span class="${rated('chassis', c.type)}">${c.type}</span></div>
            <div class="param"><span>Материал шасси</span><span class="${rated('chassisMaterial', c.material)}">${c.material}</span></div>
            <div class="param"><span>Панели кузова</span><span class="${rated('panelMaterial', c.panelMaterial)}">${c.panelMaterial}</span></div>
            <div class="param"><span>Передняя подвеска</span><span class="${rated('frontSusp', c.frontSusp)}">${c.frontSusp}</span></div>
            <div class="param"><span>Задняя подвеска</span><span class="${rated('rearSusp', c.rearSusp)}">${c.rearSusp}</span></div>
            <div class="param"><span>Амортизаторы</span><span class="${rated('dampers', c.dampers)}">${c.dampers}</span></div>
          </div>
          <div class="spec-column"><h3>Тормоза и колёса</h3>
            <div class="param"><span>Передние тормоза</span><span class="${rated('brakes', b.front.split(' ')[0])}">${b.front}</span></div>
            <div class="param"><span>Задние тормоза</span><span class="${rated('brakes', b.rear.split(' ')[0])}">${b.rear}</span></div>
            <div class="param"><span>Диски</span><span class="${rated('wheelDiameter', r.wheelDiameter)}">${w.size}</span></div>
            <div class="param"><span>Шины</span><span>${w.tires}</span></div>
          </div>
          <div class="spec-column"><h3>Интерьер и динамика</h3>
            <div class="param"><span>Мультимедиа</span><span class="${rated('entertainment', i.entertainment)}">${i.entertainment}</span></div>
            <div class="param"><span>Ассистенты</span><span class="${rated('assists', i.assists)}">${i.assists}</span></div>
            <div class="param"><span>Комфорт</span><span class="${rated('comfortRange', r.comfort)}">${s.comfort}</span></div>
            <div class="param"><span>Управляемость</span><span class="${rated('drivabilityRange', r.drivability)}">${s.drivability}</span></div>
            <div class="param"><span>Макс. скорость</span><span class="${rated('topSpeed', r.topSpeed)}">${s.topSpeed}</span></div>
            <div class="param"><span>Разгон 0‑100</span><span class="${rated('acceleration', r.accel0_100)}">${s.acceleration}</span></div>
            <div class="param"><span>Тормозной путь</span><span class="${rated('braking', r.braking100_0)}">${s.braking}</span></div>
            <div class="param"><span>Боковые перегрузки</span><span class="${rated('cornering', r.corneringG)}">${s.cornering}</span></div>
          </div>
        </div>
        <div class="spec-grid" style="margin-top:8px;">
          <div class="spec-column"><h3>Эксплуатационные</h3>
            <div class="param"><span>Внедорожность</span><span class="${rated('offroad', r.offroad)}">${s.offroad}</span></div>
            <div class="param"><span>Кабриолет-фактор</span><span class="${rated('convertible', r.convertibleFactor)}">${s.convertible}</span></div>
            <div class="param"><span>Расход топлива</span><span class="${rated('economy', r.economy)}">${s.economy}</span></div>
            <div class="param"><span>Выбросы CO₂</span><span class="${rated('emissions', r.emissions)}">${s.emissions}</span></div>
            <div class="param"><span>Развесовка</span><span>${s.weightDist}</span></div>
            <div class="param"><span>Цена (ориент.)</span><span class="${rated('price', r.price)}">${s.price}</span></div>
          </div>
        </div>
      `;
    }

    function renderGoal(data) {
      return `
        <div class="goal-box">
          <div class="goal-title">${data.carClass}</div>
          <div class="goal-desc">
            <div><strong>Кузов:</strong> ${data.body}</div>
            <div><strong>Двигатель:</strong> ${data.enginePlace}</div>
            <div><strong>Привод:</strong> ${data.drivetrain}</div>
            <div><strong>Год выпуска:</strong> ${data.year}</div>
          </div>
          <div style="margin-top:18px; color:#a0aac0;">Создайте автомобиль в Automation, ориентируясь на эту концепцию.</div>
        </div>
      `;
    }

    // ================== ФУНКЦИЯ ДЛЯ СОПЕРНИКА ==================
    function renderRival() {
      const fc = fixClass.value || null;
      const fb = fixBody.value || null;
      const car1 = generateFullSpec(fc, fb);
      const car2 = generateFullSpec(fc, fb); // те же фильтры, но случайные параметры
      return `
        <div class="comparison-container">
          <div class="comparison-column">${renderFullSpec(car1)}</div>
          <div class="comparison-column">${renderFullSpec(car2)}</div>
        </div>
      `;
    }

    const output = document.getElementById("outputDisplay");
    document.getElementById("fullSpecBtn").addEventListener("click", () => {
      const fc = fixClass.value || null;
      const fb = fixBody.value || null;
      output.innerHTML = renderFullSpec(generateFullSpec(fc, fb));
    });
    document.getElementById("goalBtn").addEventListener("click", () => {
      output.innerHTML = renderGoal(generateGoal());
    });
    document.getElementById("nameGenBtn").addEventListener("click", () => {
      output.innerHTML = `<div style="text-align:center;font-size:2rem;">${generateName()}</div>`;
    });
    document.getElementById("rivalBtn").addEventListener("click", () => {
      output.innerHTML = renderRival();
    });
  })();
</script>
</body>
</html>
